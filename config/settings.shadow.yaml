api:
  gamma_base_url: "https://gamma-api.polymarket.com"
  gamma_markets_endpoint: "/markets"
  clob_base_url: "https://clob.polymarket.com"
  gamma_page_size: 200
  gamma_max_pages: 12
  ws_market_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"

strategy:
  entry_threshold_sum_ask: 0.985
  min_ask: 0.01
  max_ask: 0.99
  expiry_block_minutes: 180
  signal_cooldown_seconds: 45
  enable_quality_guards: true
  max_spread_per_leg: 0.04
  min_depth_per_leg: 10.0
  max_quote_age_ms_for_signal: 2500
  adjusted_edge_min: 0.002
  slippage_penalty_ticks: 1.5

risk:
  max_open_positions: 3
  max_positions_per_market: 1
  paper_order_size_usdc: 3.0
  max_daily_signals: 120
  min_book_size: 5.0
  stale_quote_ms: 2500
  fill_latency_ms: 400
  slip_ticks: 2
  base_fill_probability: 0.9
  allow_partial_fills: true

storage:
  sqlite_path: "data/state/state.db"
  export_dir: "data/exports"
  log_dir: "data/logs"

runtime:
  reconnect_base_seconds: 2.0
  reconnect_max_seconds: 30.0
  websocket_ping_interval_seconds: 20
  websocket_ping_timeout_seconds: 20
  websocket_receive_timeout_seconds: 180
  websocket_receive_timeout_reconnect_count: 5
  reconnect_recovery_grace_ms: 120000
  reconnect_recovery_min_ready_asset_ratio: 0.5
  market_refresh_minutes: 30
  market_universe_change_confirmations: 3
  market_universe_change_min_asset_delta: 6
  market_probation_ms: 300000
  market_probation_min_quote_updates_per_asset: 3
  market_probation_min_ready_asset_ratio: 1.0
  market_eligibility_min_quote_updates_per_asset: 3
  market_no_signal_reason_cooldown_ms: 20000
  market_recovering_max_ms: 300000
  stale_asset_ms: 90000
  initial_market_data_grace_ms: 45000
  per_asset_book_grace_ms: 120000
  resync_recovery_grace_ms: 180000
  no_data_resync_cooldown_ms: 300000
  quote_missing_after_resync_delay_ms: 300000
  asset_block_min_consecutive_unhealthy_cycles: 3
  market_block_min_consecutive_unhealthy_cycles: 2
  book_resync_idle_ms: 180000
  resync_cooldown_ms: 180000
  same_reason_resync_cooldown_ms: 300000
  missing_book_resync_cooldown_ms: 480000
  stale_asset_resync_cooldown_ms: 420000
  stale_asset_resync_additional_cooldown_ms: 300000
  stale_asset_resync_ready_ratio_min: 1.0
  full_resync_cooldown_ms: 300000
  max_resync_assets_per_cycle: 25
  resync_batch_size: 80
  low_quality_market_penalty_threshold: 10
  low_quality_market_penalty_increment: 2
  low_quality_market_penalty_decay: 1
  low_quality_market_min_observations: 3
  low_quality_market_exclusion_consecutive_cycles: 18
  low_quality_market_degraded_penalty_ratio: 0.5
  low_quality_market_probation_penalty_ratio: 1.0
  low_quality_market_exclusion_candidate_penalty_ratio: 1.8
  min_watched_markets_floor: 10
  watched_floor_relax_activity_filters: true
  watched_floor_relax_runtime_exclusion: true
  snapshot_interval_minutes: 60
  report_export_interval_minutes: 1440
  environment_name: "shadow-paper-win11"

guardrails:
  window_minutes: 20
  safe_mode_cooldown_minutes: 20
  max_signal_rate_per_min: 12.0
  max_reject_rate: 0.65
  max_one_leg_rate: 0.30
  max_unmatched_rate: 0.35
  max_stale_asset_rate: 0.70
  max_resync_rate_per_min: 8.0
  max_exception_rate_per_min: 6.0
  global_unhealthy_consecutive_count: 4
  global_unhealthy_min_duration_seconds: 300
  global_unhealthy_min_asset_ratio: 1.0
  global_ws_unhealthy_min_asset_ratio: 1.0
  hard_stop_on_exception_spike: false
  hard_stop_exception_rate_per_min: 15.0

market_filters:
  exclude_categories: []
  exclude_keywords: []
  require_orderbook_enabled: true
  max_markets_to_watch: 20
  min_days_to_expiry: 0.5
  max_days_to_expiry: 365.0
  min_recent_activity: 500.0
  min_liquidity_proxy: 250.0
  min_volume_24h_proxy: 100.0
  require_recent_trade_within_minutes:
  prefer_existing_watched_markets: true
  existing_market_hysteresis_score_ratio: 0.85
  max_market_replacements_per_refresh: 2
