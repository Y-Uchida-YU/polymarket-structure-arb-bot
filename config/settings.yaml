api:
  gamma_base_url: "https://gamma-api.polymarket.com"
  gamma_markets_endpoint: "/markets"
  clob_base_url: "https://clob.polymarket.com"
  gamma_page_size: 200
  gamma_max_pages: 10
  ws_market_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"

strategy:
  entry_threshold_sum_ask: 0.985
  min_ask: 0.01
  max_ask: 0.99
  expiry_block_minutes: 180
  signal_cooldown_seconds: 30
  enable_quality_guards: true
  max_spread_per_leg: 0.05
  min_depth_per_leg: 5.0
  max_quote_age_ms_for_signal: 3000
  adjusted_edge_min: 0.0
  slippage_penalty_ticks: 1.0

risk:
  max_open_positions: 5
  max_positions_per_market: 1
  paper_order_size_usdc: 5.0
  max_daily_signals: 200
  min_book_size: 0.0
  stale_quote_ms: 3000
  fill_latency_ms: 300
  slip_ticks: 1
  base_fill_probability: 0.95
  allow_partial_fills: true

storage:
  sqlite_path: "data/state/state.db"
  export_dir: "data/exports"
  log_dir: "data/logs"

runtime:
  reconnect_base_seconds: 2.0
  reconnect_max_seconds: 30.0
  websocket_ping_interval_seconds: 20
  websocket_ping_timeout_seconds: 20
  websocket_receive_timeout_seconds: 120
  websocket_receive_timeout_reconnect_count: 3
  reconnect_recovery_grace_ms: 90000
  reconnect_recovery_min_ready_asset_ratio: 0.6
  market_refresh_minutes: 60
  market_universe_change_confirmations: 2
  market_universe_change_min_asset_delta: 4
  market_probation_ms: 0
  market_probation_min_quote_updates_per_asset: 2
  market_probation_min_ready_asset_ratio: 1.0
  market_eligibility_min_quote_updates_per_asset: 1
  market_no_signal_reason_cooldown_ms: 15000
  market_recovering_max_ms: 480000
  stale_asset_ms: 15000
  initial_market_data_grace_ms: 30000
  per_asset_book_grace_ms: 45000
  resync_recovery_grace_ms: 180000
  no_data_resync_cooldown_ms: 240000
  quote_missing_after_resync_delay_ms: 240000
  asset_block_min_consecutive_unhealthy_cycles: 2
  market_block_min_consecutive_unhealthy_cycles: 2
  book_resync_idle_ms: 20000
  resync_cooldown_ms: 60000
  same_reason_resync_cooldown_ms: 120000
  missing_book_resync_cooldown_ms: 180000
  stale_asset_resync_cooldown_ms: 180000
  stale_asset_resync_additional_cooldown_ms: 180000
  stale_asset_resync_ready_ratio_min: 1.0
  full_resync_cooldown_ms: 120000
  max_resync_assets_per_cycle: 50
  resync_batch_size: 100
  low_quality_market_penalty_threshold: 12
  low_quality_market_penalty_increment: 2
  low_quality_market_penalty_decay: 1
  low_quality_market_min_observations: 3
  snapshot_interval_minutes: 60
  report_export_interval_minutes: 1440
  environment_name: "win11-local"

guardrails:
  window_minutes: 15
  safe_mode_cooldown_minutes: 15
  max_signal_rate_per_min: 20.0
  max_reject_rate: 0.70
  max_one_leg_rate: 0.35
  max_unmatched_rate: 0.40
  max_stale_asset_rate: 0.80
  max_resync_rate_per_min: 40.0
  max_exception_rate_per_min: 8.0
  global_unhealthy_consecutive_count: 3
  global_unhealthy_min_duration_seconds: 180
  global_unhealthy_min_asset_ratio: 0.95
  global_ws_unhealthy_min_asset_ratio: 0.95
  hard_stop_on_exception_spike: false
  hard_stop_exception_rate_per_min: 20.0

market_filters:
  exclude_categories:
    - politics
    - geopolitics
    - death
    - celebrity
  exclude_keywords: []
  require_orderbook_enabled: true
  max_markets_to_watch: 120
  min_days_to_expiry: 0.5
  max_days_to_expiry: 180
  min_recent_activity: 0.0
  min_liquidity_proxy: 0.0
  min_volume_24h_proxy: 0.0
  require_recent_trade_within_minutes:
  prefer_existing_watched_markets: true
  existing_market_hysteresis_score_ratio: 0.9
  max_market_replacements_per_refresh: 2
